<div>
  <h2 class="text-2xl font-bold mb-6" [class]="darkMode ? 'text-white' : 'text-gray-800'">Dashboard</h2>

  <!-- Stats cards -->
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
    <div class="rounded-xl p-5 transition-colors" [class]="darkMode ? 'bg-slate-800 border border-slate-700' : 'bg-white border border-gray-200 shadow-sm'">
      <div class="flex items-center justify-between">
        <div>
          <p class="text-sm font-medium" [class]="darkMode ? 'text-slate-400' : 'text-gray-500'">Total Classes</p>
          <p class="text-3xl font-bold mt-1" [class]="darkMode ? 'text-white' : 'text-gray-900'">{{ stats.classes }}</p>
        </div>
        <div class="w-12 h-12 rounded-lg flex items-center justify-center" [class]="darkMode ? 'bg-blue-900/40 text-blue-400' : 'bg-blue-100 text-blue-600'">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M4.26 10.147a60.438 60.438 0 0 0-.491 6.347A48.62 48.62 0 0 1 12 20.904a48.62 48.62 0 0 1 8.232-4.41 60.46 60.46 0 0 0-.491-6.347m-15.482 0a50.636 50.636 0 0 0-2.658-.813A59.906 59.906 0 0 1 12 3.493a59.903 59.903 0 0 1 10.399 5.84 51.39 51.39 0 0 0-2.658.814m-15.482 0A50.717 50.717 0 0 1 12 13.489a50.702 50.702 0 0 1 7.74-3.342"/></svg>
        </div>
      </div>
      <a routerLink="/app/classes" class="text-sm text-blue-500 hover:text-blue-400 mt-3 inline-block">View all &rarr;</a>
    </div>

    <div class="rounded-xl p-5 transition-colors" [class]="darkMode ? 'bg-slate-800 border border-slate-700' : 'bg-white border border-gray-200 shadow-sm'">
      <div class="flex items-center justify-between">
        <div>
          <p class="text-sm font-medium" [class]="darkMode ? 'text-slate-400' : 'text-gray-500'">Total Students</p>
          <p class="text-3xl font-bold mt-1" [class]="darkMode ? 'text-white' : 'text-gray-900'">{{ stats.students }}</p>
        </div>
        <div class="w-12 h-12 rounded-lg flex items-center justify-center" [class]="darkMode ? 'bg-green-900/40 text-green-400' : 'bg-green-100 text-green-600'">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 0 1 8.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0 1 11.964-3.07M12 6.375a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0Zm8.25 2.25a2.625 2.625 0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z"/></svg>
        </div>
      </div>
      <a routerLink="/app/students" class="text-sm text-green-500 hover:text-green-400 mt-3 inline-block">View all &rarr;</a>
    </div>

    <div class="rounded-xl p-5 transition-colors" [class]="darkMode ? 'bg-slate-800 border border-slate-700' : 'bg-white border border-gray-200 shadow-sm'">
      <div class="flex items-center justify-between">
        <div>
          <p class="text-sm font-medium" [class]="darkMode ? 'text-slate-400' : 'text-gray-500'">Total Subjects</p>
          <p class="text-3xl font-bold mt-1" [class]="darkMode ? 'text-white' : 'text-gray-900'">{{ stats.subjects }}</p>
        </div>
        <div class="w-12 h-12 rounded-lg flex items-center justify-center" [class]="darkMode ? 'bg-purple-900/40 text-purple-400' : 'bg-purple-100 text-purple-600'">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25"/></svg>
        </div>
      </div>
      <a routerLink="/app/subjects" class="text-sm text-purple-500 hover:text-purple-400 mt-3 inline-block">View all &rarr;</a>
    </div>

    <div class="rounded-xl p-5 transition-colors" [class]="darkMode ? 'bg-slate-800 border border-slate-700' : 'bg-white border border-gray-200 shadow-sm'">
      <div class="flex items-center justify-between">
        <div>
          <p class="text-sm font-medium" [class]="darkMode ? 'text-slate-400' : 'text-gray-500'">Your Role</p>
          <p class="text-2xl font-bold mt-1 capitalize" [class]="darkMode ? 'text-white' : 'text-gray-900'">{{ user?.role }}</p>
        </div>
        <div class="w-12 h-12 rounded-lg flex items-center justify-center" [class]="darkMode ? 'bg-amber-900/40 text-amber-400' : 'bg-amber-100 text-amber-600'">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285Z"/></svg>
        </div>
      </div>
    </div>
  </div>

  <!-- Quick actions -->
  <div class="rounded-xl p-6 transition-colors" [class]="darkMode ? 'bg-slate-800 border border-slate-700' : 'bg-white border border-gray-200 shadow-sm'">
    <h3 class="text-lg font-semibold mb-4" [class]="darkMode ? 'text-white' : 'text-gray-800'">Quick Actions</h3>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
      <a routerLink="/app/students" class="flex flex-col items-center gap-2 p-4 rounded-lg transition-colors cursor-pointer" [class]="darkMode ? 'hover:bg-slate-700 text-slate-300' : 'hover:bg-gray-50 text-gray-600'">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8 text-blue-500"><path stroke-linecap="round" stroke-linejoin="round" d="M18 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0ZM3 19.235v-.11a6.375 6.375 0 0 1 12.75 0v.109A12.318 12.318 0 0 1 9.374 21c-2.331 0-4.512-.645-6.374-1.766Z"/></svg>
        <span class="text-sm font-medium">Add Student</span>
      </a>
      <a routerLink="/app/performance" class="flex flex-col items-center gap-2 p-4 rounded-lg transition-colors cursor-pointer" [class]="darkMode ? 'hover:bg-slate-700 text-slate-300' : 'hover:bg-gray-50 text-gray-600'">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8 text-green-500"><path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 0 1 3 19.875v-6.75ZM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V8.625ZM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V4.125Z"/></svg>
        <span class="text-sm font-medium">Enter Marks</span>
      </a>
      <a routerLink="/app/reports" class="flex flex-col items-center gap-2 p-4 rounded-lg transition-colors cursor-pointer" [class]="darkMode ? 'hover:bg-slate-700 text-slate-300' : 'hover:bg-gray-50 text-gray-600'">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8 text-purple-500"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z"/></svg>
        <span class="text-sm font-medium">View Reports</span>
      </a>
      <a routerLink="/app/grading" class="flex flex-col items-center gap-2 p-4 rounded-lg transition-colors cursor-pointer" [class]="darkMode ? 'hover:bg-slate-700 text-slate-300' : 'hover:bg-gray-50 text-gray-600'">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8 text-amber-500"><path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.499a.562.562 0 0 1 1.04 0l2.125 5.111a.563.563 0 0 0 .475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 0 0-.182.557l1.285 5.385a.562.562 0 0 1-.84.61l-4.725-2.885a.562.562 0 0 0-.586 0L6.982 20.54a.562.562 0 0 1-.84-.61l1.285-5.386a.562.562 0 0 0-.182-.557l-4.204-3.602a.562.562 0 0 1 .321-.988l5.518-.442a.563.563 0 0 0 .475-.345L11.48 3.5Z"/></svg>
        <span class="text-sm font-medium">Grading Setup</span>
      </a>
    </div>
  </div>
</div>
