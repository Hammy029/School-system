<div class="flex items-center justify-center min-h-screen px-4 bg-gray-50">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 md:p-10 space-y-6">

    <!-- Title -->
    <h2 class="text-2xl font-bold text-center tracking-wide text-blue-600">Welcome Back</h2>
    <p class="text-sm text-center text-gray-500">Sign in to your school account</p>

    <!-- Login Form -->
    <form (ngSubmit)="onSubmit(loginForm)" #loginForm="ngForm" class="space-y-5">

      <!-- Email -->
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="email"
          required
          email
          #emailInput="ngModel"
          placeholder="you&#64;example.com"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white"
        />
        <div *ngIf="loginForm.submitted && emailInput.invalid" class="text-red-500 text-sm mt-1">
          Valid email is required.
        </div>
      </div>

      <!-- Password -->
      <div class="relative">
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input
          [type]="showPassword ? 'text' : 'password'"
          id="password"
          name="password"
          [(ngModel)]="password"
          required
          minlength="6"
          #passwordInput="ngModel"
          placeholder="********"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 pr-10 bg-white"
        />
        <button
          type="button"
          (click)="showPassword = !showPassword"
          class="absolute top-9 right-3 text-gray-500 cursor-pointer text-sm"
        >
          {{ showPassword ? 'Hide' : 'Show' }}
        </button>
        <div *ngIf="loginForm.submitted && passwordInput.invalid" class="text-red-500 text-sm mt-1">
          Password is required (min 6 characters).
        </div>
      </div>

      <!-- Submit -->
      <button
        type="submit"
        [disabled]="loading"
        class="w-full text-white font-semibold py-2 rounded-lg transition bg-blue-600 hover:bg-blue-700 disabled:opacity-50"
      >
        {{ loading ? 'Signing in...' : 'Login' }}
      </button>

      <!-- Links -->
      <div class="flex justify-between text-sm mt-2 text-gray-600">
        <a routerLink="/forgot-password" class="hover:underline text-blue-600">Forgot Password?</a>
        <a routerLink="/register" class="hover:underline font-medium text-blue-600">Register</a>
      </div>

      <!-- Error / Pending Approval Notice -->
      <div *ngIf="errorMessage && errorMessage.includes('pending approval')" class="bg-amber-50 border border-amber-200 rounded-lg p-3 mt-3">
        <div class="flex items-center gap-2 text-amber-700 text-sm">
          <span>&#9203;</span>
          <span>{{ errorMessage }}</span>
        </div>
      </div>
      <div *ngIf="errorMessage && !errorMessage.includes('pending approval')" class="text-red-600 text-center mt-3 text-sm">
        {{ errorMessage }}
      </div>
    </form>
  </div>
</div>
