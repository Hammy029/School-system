<div class="flex items-center justify-center min-h-screen px-4 bg-gray-50">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 md:p-10 space-y-6">

    <!-- Title -->
    <h2 class="text-2xl font-bold text-center tracking-wide text-blue-600">Create Account</h2>
    <p class="text-sm text-center text-gray-500">Register for a school account</p>

    <!-- Success Message -->
    <div *ngIf="registrationComplete" class="bg-green-50 border border-green-200 rounded-lg p-4">
      <p class="text-green-700 text-sm text-center">{{ successMessage }}</p>
      <div class="text-center mt-3">
        <a routerLink="/login" class="text-blue-600 hover:underline text-sm font-medium">Go to Login</a>
      </div>
    </div>

    <!-- Register Form -->
    <form *ngIf="!registrationComplete" (ngSubmit)="onSubmit(registerForm)" #registerForm="ngForm" class="space-y-4">

      <!-- Username -->
      <div>
        <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
        <input
          type="text"
          id="username"
          name="username"
          [(ngModel)]="username"
          required
          #usernameInput="ngModel"
          placeholder="John Doe"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white"
        />
        <div *ngIf="registerForm.submitted && usernameInput.invalid" class="text-red-500 text-sm mt-1">
          Full name is required.
        </div>
      </div>

      <!-- Phone -->
      <div>
        <label for="phone_no" class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
        <input
          type="tel"
          id="phone_no"
          name="phone_no"
          [(ngModel)]="phone_no"
          required
          #phoneInput="ngModel"
          placeholder="+254700000000"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white"
        />
        <div *ngIf="registerForm.submitted && phoneInput.invalid" class="text-red-500 text-sm mt-1">
          Phone number is required.
        </div>
      </div>

      <!-- Email -->
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="email"
          required
          email
          #emailInput="ngModel"
          placeholder="you&#64;example.com"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white"
        />
        <div *ngIf="registerForm.submitted && emailInput.invalid" class="text-red-500 text-sm mt-1">
          Valid email is required.
        </div>
      </div>

      <!-- Password -->
      <div class="relative">
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input
          [type]="showPassword ? 'text' : 'password'"
          id="password"
          name="password"
          [(ngModel)]="password"
          required
          minlength="6"
          #passwordInput="ngModel"
          placeholder="********"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 pr-10 bg-white"
        />
        <button type="button" (click)="showPassword = !showPassword"
          class="absolute top-9 right-3 text-gray-500 cursor-pointer text-sm">
          {{ showPassword ? 'Hide' : 'Show' }}
        </button>
        <div *ngIf="registerForm.submitted && passwordInput.invalid" class="text-red-500 text-sm mt-1">
          Password is required (min 6 characters).
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="relative">
        <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
        <input
          [type]="showConfirmPassword ? 'text' : 'password'"
          id="confirmPassword"
          name="confirmPassword"
          [(ngModel)]="confirmPassword"
          required
          #confirmPasswordInput="ngModel"
          placeholder="********"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 pr-10 bg-white"
        />
        <button type="button" (click)="showConfirmPassword = !showConfirmPassword"
          class="absolute top-9 right-3 text-gray-500 cursor-pointer text-sm">
          {{ showConfirmPassword ? 'Hide' : 'Show' }}
        </button>
        <div *ngIf="registerForm.submitted && password !== confirmPassword" class="text-red-500 text-sm mt-1">
          Passwords do not match.
        </div>
      </div>

      <!-- Submit -->
      <button
        type="submit"
        [disabled]="submitting"
        class="w-full text-white font-semibold py-2 rounded-lg transition bg-blue-600 hover:bg-blue-700 disabled:opacity-50"
      >
        {{ submitting ? 'Registering...' : 'Register' }}
      </button>

      <!-- Link -->
      <div class="text-center text-sm mt-2 text-gray-600">
        Already have an account?
        <a routerLink="/login" class="text-blue-600 hover:underline font-medium">Login</a>
      </div>

      <!-- Error Message -->
      <div *ngIf="errorMessage" class="text-red-600 text-center mt-3 text-sm">
        {{ errorMessage }}
      </div>
    </form>
  </div>
</div>
