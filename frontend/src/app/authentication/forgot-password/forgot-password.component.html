<div class="flex items-center justify-center min-h-screen px-4 bg-gray-50">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 md:p-10 space-y-6">

    <h2 class="text-2xl font-bold text-center tracking-wide text-blue-600">Forgot Password</h2>
    <p class="text-sm text-center text-gray-500">Enter your email to receive a password reset link</p>

    <div *ngIf="successMessage" class="bg-green-50 border border-green-200 rounded-lg p-3">
      <p class="text-green-700 text-sm text-center">{{ successMessage }}</p>
    </div>

    <div *ngIf="errorMessage" class="bg-red-50 border border-red-200 rounded-lg p-3">
      <p class="text-red-700 text-sm text-center">{{ errorMessage }}</p>
    </div>

    <form (ngSubmit)="onSubmit(forgotForm)" #forgotForm="ngForm" class="space-y-5">
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="email"
          required
          email
          #emailInput="ngModel"
          placeholder="you&#64;example.com"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white"
        />
        <div *ngIf="forgotForm.submitted && emailInput.invalid" class="text-red-500 text-sm mt-1">
          Valid email is required.
        </div>
      </div>

      <button
        type="submit"
        [disabled]="submitting"
        class="w-full text-white font-semibold py-2 rounded-lg transition bg-blue-600 hover:bg-blue-700 disabled:opacity-50"
      >
        {{ submitting ? 'Sending...' : 'Send Reset Link' }}
      </button>

      <div class="text-center text-sm mt-2">
        <a routerLink="/login" class="text-blue-600 hover:underline font-medium">Back to Login</a>
      </div>
    </form>
  </div>
</div>
