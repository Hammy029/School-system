<div class="flex items-center justify-center min-h-screen px-4 bg-gray-50">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 md:p-10 space-y-6">

    <h2 class="text-2xl font-bold text-center tracking-wide text-blue-600">Reset Password</h2>

    <div *ngIf="successMessage" class="bg-green-50 border border-green-200 rounded-lg p-3">
      <p class="text-green-700 text-sm text-center">{{ successMessage }}</p>
      <p class="text-gray-500 text-xs text-center mt-1">Redirecting to login...</p>
    </div>

    <div *ngIf="errorMessage" class="bg-red-50 border border-red-200 rounded-lg p-3">
      <p class="text-red-700 text-sm text-center">{{ errorMessage }}</p>
    </div>

    <form *ngIf="!successMessage" (ngSubmit)="onSubmit(resetForm)" #resetForm="ngForm" class="space-y-5">
      <div class="relative">
        <label for="newPassword" class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
        <input
          [type]="showPassword ? 'text' : 'password'"
          id="newPassword"
          name="newPassword"
          [(ngModel)]="newPassword"
          required
          minlength="8"
          #newPwInput="ngModel"
          placeholder="********"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 pr-10 bg-white"
        />
        <button type="button" (click)="showPassword = !showPassword"
          class="absolute top-9 right-3 text-gray-500 cursor-pointer text-sm">
          {{ showPassword ? 'Hide' : 'Show' }}
        </button>
        <div *ngIf="resetForm.submitted && newPwInput.invalid" class="text-red-500 text-sm mt-1">
          Password is required (min 8 characters).
        </div>
      </div>

      <div>
        <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
        <input
          type="password"
          id="confirmPassword"
          name="confirmPassword"
          [(ngModel)]="confirmPassword"
          required
          #confirmPwInput="ngModel"
          placeholder="********"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white"
        />
        <div *ngIf="resetForm.submitted && newPassword !== confirmPassword" class="text-red-500 text-sm mt-1">
          Passwords do not match.
        </div>
      </div>

      <button
        type="submit"
        [disabled]="submitting"
        class="w-full text-white font-semibold py-2 rounded-lg transition bg-blue-600 hover:bg-blue-700 disabled:opacity-50"
      >
        {{ submitting ? 'Resetting...' : 'Reset Password' }}
      </button>

      <div class="text-center text-sm mt-2">
        <a routerLink="/login" class="text-blue-600 hover:underline font-medium">Back to Login</a>
      </div>
    </form>
  </div>
</div>
